services:
  api:
    build: .
    container_name: pulse_desk_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      HOST: "0.0.0.0"
      PORT: "8000"
      PULSE_DB_PATH: "/app/data/pulse_desk.db"
      PULSE_SESSION_DIR: "/app/sessions"
      PULSE_LOG_DIR: "/app/logs"
    volumes:
      - pulse_data:/app/data
      - pulse_sessions:/app/sessions
      - pulse_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pulse_data:
  pulse_sessions:
  pulse_logs:
